<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dandelion router prototype</title>
<style>
  :root {
    color-scheme: light;
    --bg: #f4efe6;
    --panel: #fffdf9;
    --panel-2: #f8f7f2;
    --line: rgba(23, 24, 27, 0.13);
    --line-strong: rgba(23, 24, 27, 0.22);
    --text: #151619;
    --muted: #64686f;
    --copper: #ba7146;
    --copper-soft: #f2dfcf;
    --green: #287a54;
    --green-soft: #dcecdf;
    --blue: #2f68a7;
    --blue-soft: #dce8f5;
    --red: #a44343;
    --red-soft: #f1dada;
    --shadow: 0 18px 50px rgba(33, 27, 21, 0.08);
  }

  * { box-sizing: border-box; }

  html,
  body {
    margin: 0;
    min-height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  button {
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--text);
    border-radius: 7px;
    cursor: pointer;
    font: inherit;
    min-height: 34px;
    padding: 7px 12px;
  }

  button:hover { border-color: var(--line-strong); }
  button.primary { background: var(--text); color: white; border-color: var(--text); }
  button:disabled { cursor: not-allowed; opacity: 0.55; }

  .shell {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 280px minmax(0, 1fr) 410px;
  }

  .sidebar {
    border-right: 1px solid var(--line);
    padding: 18px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    margin-bottom: 22px;
  }

  .brand img { width: 25px; height: 25px; }

  .scenario-list {
    display: grid;
    gap: 8px;
  }

  .scenario-button {
    text-align: left;
    width: 100%;
    padding: 10px;
    background: rgba(255, 253, 249, 0.72);
  }

  .scenario-button.active {
    border-color: var(--copper);
    background: var(--copper-soft);
  }

  .scenario-title {
    display: block;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .scenario-description {
    display: block;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.35;
  }

  .main {
    min-width: 0;
    padding: 18px 22px 28px;
  }

  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .model-chip,
  .route-chip {
    border: 1px solid var(--line);
    background: rgba(255, 253, 249, 0.78);
    border-radius: 999px;
    color: var(--muted);
    font-size: 12px;
    padding: 5px 9px;
  }

  .topbar-actions { margin-left: auto; display: flex; gap: 8px; }

  .conversation {
    max-width: 820px;
    margin: 0 auto;
    padding-bottom: 120px;
  }

  .turn {
    margin: 16px 0;
  }

  .turn.user {
    display: flex;
    justify-content: flex-end;
  }

  .bubble {
    background: #ece6db;
    border-radius: 15px 15px 4px 15px;
    max-width: 76%;
    padding: 10px 13px;
    white-space: pre-wrap;
  }

  .assistant-body {
    white-space: pre-wrap;
    font-size: 15px;
    line-height: 1.62;
  }

  .merge-banner,
  .conflict-box {
    border: 1px solid var(--line);
    background: var(--panel);
    box-shadow: var(--shadow);
    border-radius: 8px;
    margin: 18px 0;
    padding: 14px;
  }

  .merge-banner {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .route-mark {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    background: var(--blue-soft);
    color: var(--blue);
    font-weight: 700;
    flex: 0 0 auto;
  }

  .merge-title,
  .conflict-title {
    font-weight: 650;
    margin-bottom: 2px;
  }

  .merge-subtitle,
  .conflict-subtitle {
    color: var(--muted);
    font-size: 12px;
  }

  .choice-list {
    display: grid;
    gap: 8px;
    margin-top: 12px;
  }

  .choice {
    display: flex;
    align-items: center;
    gap: 10px;
    text-align: left;
    width: 100%;
  }

  .choice-index {
    background: var(--red-soft);
    color: var(--red);
    border-radius: 50%;
    display: grid;
    flex: 0 0 auto;
    font-size: 12px;
    font-weight: 700;
    height: 24px;
    place-items: center;
    width: 24px;
  }

  .drawer {
    background: #f1ebdd;
    border-left: 1px solid var(--line);
    min-width: 0;
    padding: 18px;
    overflow-y: auto;
  }

  .drawer-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .drawer-title { font-weight: 650; }
  .drawer-count { color: var(--muted); font-size: 12px; }

  .thread-list {
    display: grid;
    gap: 10px;
  }

  .thread {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px;
  }

  .thread.selected { border-color: var(--copper); box-shadow: inset 0 0 0 1px rgba(186, 113, 70, 0.2); }

  .thread-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex: 0 0 auto;
  }

  .status-dot.running {
    animation: pulse 1.1s ease-in-out infinite;
    background: var(--blue);
  }

  .status-dot.completed { background: var(--green); }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.4); opacity: 1; }
  }

  .thread-title { font-weight: 650; }
  .thread-status { color: var(--muted); font-size: 12px; margin-left: auto; }

  .thread-text {
    color: var(--text);
    font-size: 13px;
    line-height: 1.48;
    max-height: 162px;
    overflow: auto;
    white-space: pre-wrap;
  }

  .thread-claims {
    border-top: 1px solid var(--line);
    color: var(--muted);
    font-size: 12px;
    margin-top: 10px;
    padding-top: 9px;
    white-space: pre-wrap;
  }

  .empty {
    color: var(--muted);
    padding: 36px 0;
    text-align: center;
  }

  @media (max-width: 980px) {
    .shell { grid-template-columns: 1fr; }
    .sidebar,
    .drawer { border: 0; }
    .drawer { padding-top: 0; }
    .bubble { max-width: 92%; }
  }
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <img src="/brand/logos/dandelion.svg" alt="">
      <span>Dandelion</span>
    </div>
    <div id="scenario-list" class="scenario-list"></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <span id="model-chip" class="model-chip">Ollama</span>
      <span id="route-chip" class="route-chip">router idle</span>
      <div class="topbar-actions">
        <button id="reset-btn">Reset</button>
        <button id="run-btn" class="primary">Run plants</button>
      </div>
    </div>
    <section id="conversation" class="conversation"></section>
  </main>

  <aside class="drawer">
    <div class="drawer-head">
      <span class="drawer-title">Plants</span>
      <span id="thread-count" class="drawer-count">0 selected</span>
    </div>
    <div id="thread-list" class="thread-list"></div>
  </aside>
</div>

<script>
const state = {
  scenarios: [],
  selectedId: null,
  active: null,
  running: false,
  result: null,
};

const scenarioList = document.querySelector('#scenario-list');
const conversation = document.querySelector('#conversation');
const threadList = document.querySelector('#thread-list');
const runBtn = document.querySelector('#run-btn');
const resetBtn = document.querySelector('#reset-btn');
const routeChip = document.querySelector('#route-chip');
const modelChip = document.querySelector('#model-chip');
const threadCount = document.querySelector('#thread-count');

function escapeHtml(value) {
  return value
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;');
}

async function api(path, options = {}) {
  const response = await fetch(path, {
    headers: { 'Content-Type': 'application/json' },
    ...options,
  });
  const json = await response.json();
  if (!response.ok) throw new Error(json.error || 'Request failed');
  return json;
}

async function loadScenarios() {
  const data = await api('/api/scenarios');
  state.scenarios = data.scenarios;
  modelChip.textContent = `Ollama ${data.model}`;
  state.selectedId = data.scenarios[0]?.id;
  renderScenarioList();
  await loadScenarioPreview();
}

function renderScenarioList() {
  scenarioList.innerHTML = state.scenarios.map((scenario) => `
    <button class="scenario-button ${scenario.id === state.selectedId ? 'active' : ''}" data-id="${scenario.id}">
      <span class="scenario-title">${escapeHtml(scenario.title)}</span>
      <span class="scenario-description">${escapeHtml(scenario.description)}</span>
    </button>
  `).join('');

  scenarioList.querySelectorAll('button').forEach((button) => {
    button.addEventListener('click', async () => {
      state.selectedId = button.dataset.id;
      state.result = null;
      renderScenarioList();
      await loadScenarioPreview();
    });
  });
}

async function loadScenarioPreview() {
  runBtn.disabled = false;
  routeChip.textContent = 'router idle';
  conversation.innerHTML = '<div class="empty">Run the selected scenario to test the context router.</div>';
  threadList.innerHTML = '';
  threadCount.textContent = '0 selected';
}

function renderConversation(payload = state.result) {
  if (!payload) return;
  const parentTurns = payload.scenario.parent.map((turn) => {
    if (turn.role === 'user') {
      return `<div class="turn user"><div class="bubble">${escapeHtml(turn.content)}</div></div>`;
    }
    return `<div class="turn assistant"><div class="assistant-body">${escapeHtml(turn.content)}</div></div>`;
  }).join('');

  const mergeBanner = `
    <div class="merge-banner">
      <div class="route-mark">${payload.route.kind === 'material_conflict' ? '!' : '+'}</div>
      <div>
        <div class="merge-title">${routeTitle(payload.route.kind)}</div>
        <div class="merge-subtitle">${routeSubtitle(payload.route.kind)}</div>
      </div>
    </div>
  `;

  const followUp = `<div class="turn user"><div class="bubble">${escapeHtml(payload.scenario.followUp)}</div></div>`;
  const answer = payload.result.kind === 'conflict'
    ? renderConflict(payload.result)
    : `<div class="turn assistant"><div class="assistant-body">${escapeHtml(payload.result.text)}</div></div>`;

  conversation.innerHTML = parentTurns + mergeBanner + followUp + answer;
}

function routeTitle(route) {
  if (route === 'material_conflict') return 'Conflict found';
  return 'Context updated';
}

function routeSubtitle(route) {
  if (route === 'material_conflict') return 'Dandelion asks before continuing.';
  return 'The answer continues without recap.';
}

function renderConflict(result) {
  return `
    <div class="conflict-box">
      <div class="conflict-title">${escapeHtml(result.text)}</div>
      <div class="conflict-subtitle">Choose the path the main thread should use from here.</div>
      <div class="choice-list">
        ${result.choices.map((choice, index) => `
          <button class="choice" data-choice="${index}">
            <span class="choice-index">${index + 1}</span>
            <span>${escapeHtml(choice)}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

function renderThreads(payload, phase = 'completed') {
  const branches = payload?.scenario?.branches ?? [];
  threadCount.textContent = `${branches.length} selected`;
  threadList.innerHTML = branches.map((branch, index) => {
    const status = phase === 'running' && index > 0 ? 'running' : phase;
    const label = status === 'running' ? 'running' : 'completed';
    const text = status === 'running' ? 'Working...' : branch.transcript;
    return `
      <article class="thread selected">
        <div class="thread-head">
          <span class="status-dot ${status}"></span>
          <span class="thread-title">${escapeHtml(branch.title)}</span>
          <span class="thread-status">${label}</span>
        </div>
        <div class="thread-text">${escapeHtml(text)}</div>
        ${status === 'completed' ? `<div class="thread-claims">${escapeHtml(branch.claims)}</div>` : ''}
      </article>
    `;
  }).join('');
}

async function runScenario() {
  if (!state.selectedId || state.running) return;
  state.running = true;
  runBtn.disabled = true;
  routeChip.textContent = 'running plants';
  conversation.innerHTML = '<div class="empty">Plants are running...</div>';

  try {
    const payload = await api('/api/run', {
      method: 'POST',
      body: JSON.stringify({ scenarioId: state.selectedId }),
    });
    state.result = payload;
    routeChip.textContent = (payload.route.kind || 'unknown').replace('_', ' ');
    renderThreads(payload);
    renderConversation(payload);
  } catch (error) {
    conversation.innerHTML = `<div class="conflict-box"><div class="conflict-title">Prototype error</div><div class="conflict-subtitle">${escapeHtml(error.message)}</div></div>`;
    routeChip.textContent = 'error';
  } finally {
    state.running = false;
    runBtn.disabled = false;
  }
}

runBtn.addEventListener('click', runScenario);
resetBtn.addEventListener('click', loadScenarioPreview);

loadScenarios().catch((error) => {
  conversation.innerHTML = `<div class="conflict-box"><div class="conflict-title">Could not start prototype</div><div class="conflict-subtitle">${escapeHtml(error.message)}</div></div>`;
});
</script>
</body>
</html>
