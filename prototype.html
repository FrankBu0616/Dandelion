<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dandelion — prototype</title>
<link rel="icon" href="brand/logos/dandelion_app_icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="brand/logos/dandelion_app_icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="prototype/styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
</head>
<body>

  <!-- ============ TOP BAR ============ -->
  <div class="top-bar">
    <button class="sessions-open-btn" id="sessions-open-btn" type="button"
            aria-expanded="false" aria-controls="sessions-sidebar" title="Saved sessions">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <line x1="2.5" y1="4" x2="13.5" y2="4"/>
        <line x1="2.5" y1="8" x2="13.5" y2="8"/>
        <line x1="2.5" y1="12" x2="13.5" y2="12"/>
      </svg>
    </button>
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 120 120" fill="none">
        <!-- Dandelion mark — DAG rotated 35°. See /brand/logos/dandelion.svg -->
        <g transform="rotate(35 60 60)">
          <g stroke="currentColor" stroke-width="7" stroke-linecap="round">
            <line x1="32" y1="30" x2="60" y2="90"/>
            <line x1="60" y1="30" x2="60" y2="90"/>
            <line x1="88" y1="30" x2="60" y2="90"/>
          </g>
          <g fill="currentColor">
            <circle cx="32" cy="30" r="10"/>
            <circle cx="60" cy="30" r="10"/>
            <circle cx="88" cy="30" r="10"/>
            <rect x="49" y="79" width="22" height="22" transform="rotate(45 60 90)"/>
          </g>
        </g>
      </svg>
      dandelion
    </div>
    <div class="actions">
      <span class="plant-count" id="plant-count"></span>
      <div class="model-picker" id="model-picker">
        <button class="chip" id="model-chip">
          <span class="dot" id="model-dot"></span>
          <span id="model-name">…</span>
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M2 4 L5 7 L8 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="model-picker-menu" id="model-menu"></div>
      </div>
      <button class="new-btn" id="reset-btn">New session</button>
    </div>

  </div>

  <!-- Right-edge drawer tab — always visible. Clicking toggles the inspector
       drawer that slides in beside it. Tab translates with the drawer so it
       stays glued to the drawer's outer edge. -->
  <button class="context-drawer-tab" id="context-open-btn" type="button"
          aria-controls="context-inspector" aria-expanded="false"
          title="Open context inspector">
    <span class="context-drawer-tab-label">Context</span>
    <span class="context-drawer-tab-count" id="context-open-btn-count" hidden></span>
  </button>

  <aside class="context-inspector" id="context-inspector" aria-hidden="true">
    <div class="context-inspector-header">
      <div>
        <div class="context-inspector-title">Context</div>
        <div class="context-inspector-count" id="context-inspector-count">0 admitted segments</div>
      </div>
      <button class="context-close-btn" id="context-close-btn" type="button" aria-label="Close context">×</button>
    </div>
    <div class="context-ledger" id="context-ledger"></div>
  </aside>

  <aside class="sessions-sidebar" id="sessions-sidebar" aria-hidden="true">
    <div class="sessions-sidebar-header">
      <div>
        <div class="sessions-sidebar-title">Sessions</div>
        <div class="sessions-sidebar-subtitle">Recent first</div>
      </div>
      <button class="sessions-close-btn" id="sessions-close-btn" type="button" aria-label="Close sessions">×</button>
    </div>
    <button class="sessions-new-btn" id="sessions-new-btn" type="button">+ New session</button>
    <div class="sessions-list" id="sessions-list"></div>
    <div class="sessions-empty" id="sessions-empty" hidden>
      <div class="sessions-empty-title">No saved sessions yet</div>
      <div class="sessions-empty-copy">Start a conversation — it will be saved here automatically.</div>
    </div>
  </aside>

  <!-- ============ WORKSPACE ============ -->
  <div id="workspace">

    <div id="main-column">
      <div id="main-inner"></div>

      <div class="main-composer">
        <div class="main-composer-inner">
          <div class="composer-attachments" id="composer-attachments" hidden></div>
          <div class="composer-box">
            <textarea id="composer-input" placeholder="Ask anything…" rows="1"></textarea>

            <input type="file" id="composer-file-input" multiple hidden
                   accept="application/pdf,image/png,image/jpeg,image/gif,image/webp,text/plain" />
            <button class="attach-btn" id="composer-attach" title="Attach files (PDF, image, text)" aria-label="Attach files" hidden>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M10.5 4 L5.5 9 a1.5 1.5 0 0 0 2.12 2.12 L12.62 6.12 a3 3 0 0 0 -4.24 -4.24 L3.38 6.88 a4.5 4.5 0 0 0 6.36 6.36 L14 9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>

            <button class="plant-btn" id="plant-btn" title="Plant a side seed that shares this context" aria-label="Plant a side seed">
              <svg width="18" height="18" viewBox="0 0 120 120" fill="none">
                <!-- Dandelion mark — matches brand icon. -->
                <g transform="rotate(35 60 60)">
                  <g stroke="currentColor" stroke-width="10" stroke-linecap="round">
                    <line x1="32" y1="30" x2="60" y2="90"/>
                    <line x1="60" y1="30" x2="60" y2="90"/>
                    <line x1="88" y1="30" x2="60" y2="90"/>
                  </g>
                  <g fill="currentColor">
                    <circle cx="32" cy="30" r="12"/>
                    <circle cx="60" cy="30" r="12"/>
                    <circle cx="88" cy="30" r="12"/>
                    <rect x="48" y="78" width="24" height="24" transform="rotate(45 60 90)"/>
                  </g>
                </g>
              </svg>
              <span>Plant</span>
            </button>

            <button class="send-btn" id="composer-send" title="Send (↵)">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <path d="M2 8 L14 8 M9 3 L14 8 L9 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="plant-column" aria-hidden="true">
      <div class="plant-column-header">
        <div>
          <div class="plant-column-title">Seeds</div>
          <div class="plant-column-subtitle" id="plant-column-subtitle">—</div>
        </div>
        <button class="tray-add-btn" id="tray-add-btn" title="New seed" aria-label="New seed">+</button>
        <button class="tray-close-btn" id="tray-close-btn" title="Close seeds" aria-label="Close seeds">×</button>
      </div>
      <div class="plant-column-body" id="plant-column-body"></div>
      <div class="plant-column-footer">
        <button class="graft-btn" id="graft-btn" disabled>Graft selected</button>
        <div class="graft-hint" id="graft-hint">Select completed seeds to graft.</div>
      </div>
    </div>

  </div>

<script type="module" src="./prototype/bootstrap.mjs"></script>
</body>
</html>
