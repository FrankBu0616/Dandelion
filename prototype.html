<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dandelion — prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    color-scheme: light;
    /* Dandelion — Direction A "Warm anchor" palette */
    --bg: #F4EFE6;                                     /* Cream — page bg */
    --surface: #FFFFFF;                                /* White — cards */
    --surface-soft: #ECE6DB;                           /* Soft cream — alt surface */
    --plant-bg: #F1EBDD;                              /* Slight tint — plant bg */
    --border: rgba(15, 15, 18, 0.10);                  /* Hairline */
    --border-strong: rgba(15, 15, 18, 0.18);           /* Stronger hairline */
    --text: #0F0F12;                                   /* Ink */
    --text-soft: #2A2A2E;                              /* Ink — softened */
    --muted: #5C5F66;                                  /* Slate */
    --accent: #C97B4E;                                 /* Copper — primary accent */
    --accent-hover: #B16A3D;                           /* Copper darker (hover) */
    --accent-soft: #F4E4D0;                            /* Copper tint (soft bg) */
    --user-bg: #ECE6DB;                                /* User message bg */
    --weave-bg: #F4E4D0;                               /* Copper tint — merge highlight */
    --weave-border: #E0C098;                           /* Mid copper border */
    --weave-text: #8A4F22;                             /* Dark copper text on weave */
    --plant-divider: rgba(15, 15, 18, 0.18);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }
  button { font: inherit; color: inherit; }

  /* ============ TOP BAR ============ */
  .top-bar {
    position: fixed; top: 0; left: 0; right: 0;
    height: 52px;
    display: flex; align-items: center;
    padding: 0 18px;
    border-bottom: 1px solid var(--border);
    background: rgba(244, 239, 230, 0.92);
    backdrop-filter: blur(8px);
    z-index: 30;
    font-size: 14px;
  }
  .top-bar .brand {
    font-weight: 500;
    letter-spacing: -0.02em;
    font-size: 14px;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .top-bar .brand-mark {
    width: 18px; height: 18px;
    color: var(--text);
  }
  .top-bar .context-chip {
    margin-left: 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12px;
    color: var(--text-soft);
    max-width: 420px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    display: none;
  }
  .top-bar .context-chip.visible { display: inline-block; }
  .top-bar .context-chip .label {
    color: var(--muted);
    margin-right: 6px;
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .top-bar .actions {
    margin-left: auto;
    display: flex; gap: 8px; align-items: center;
  }
  .top-bar .plant-count {
    font-size: 11px;
    color: var(--muted);
    margin-right: 4px;
  }

  /* model picker chip */
  .model-picker {
    position: relative;
    display: none;
  }
  .model-picker .chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px;
    padding: 5px 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 6px;
    cursor: pointer;
    color: var(--text-soft);
  }
  .model-picker .chip:hover { background: var(--surface-soft); }
  .model-picker .chip .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #16a34a;
  }
  .model-picker .chip .dot.local { background: #f59e0b; }
  .model-picker-menu {
    position: absolute;
    top: calc(100% + 6px); right: 0;
    width: 280px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    padding: 6px;
    z-index: 40;
    display: none;
  }
  .model-picker-menu.open { display: block; }
  .model-group {
    padding: 8px 10px 4px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    display: flex; align-items: center; gap: 6px;
  }
  .model-option {
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; gap: 9px;
    font-size: 13px;
  }
  .model-option:hover { background: var(--surface-soft); }
  .model-option.selected { background: var(--accent-soft); color: var(--accent); }
  .model-option .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--border-strong);
    flex-shrink: 0;
  }
  .model-option.selected .dot { background: var(--accent); }
  .model-option .secondary {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
  }
  .top-bar .new-btn {
    font-size: 12px;
    padding: 5px 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 6px;
    cursor: pointer;
  }
  .top-bar .new-btn:hover { background: var(--surface-soft); }

  /* ============ WORKSPACE ============ */
  #workspace {
    position: fixed; inset: 52px 0 0 0;
    display: flex;
  }
  /* main column — always present */
  #main-column {
    flex: 1 1 100%;
    min-width: 0;
    overflow-y: auto;
    position: relative;
    transition: flex-basis 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  /* right column — plants */
  #plant-column {
    flex: 0 0 0%;
    min-width: 0;
    overflow: hidden;
    background: var(--plant-bg);
    border-left: 1px solid var(--plant-divider);
    display: flex; flex-direction: column;
    transition: flex-basis 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  body.has-plants #main-column { flex: 1 1 50%; }
  body.has-plants #plant-column { flex: 1 1 50%; }

  /* main column inner */
  #main-inner {
    max-width: 760px;
    margin: 0 auto;
    padding: 32px 24px 72px;
    transition: max-width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  body.has-plants #main-inner {
    max-width: none;
    padding: 32px 32px 72px;
  }
  body.is-empty #main-column {
    overflow-y: hidden;
  }
  body.is-empty #main-inner {
    height: calc(100% - 98px);
    padding-top: 0;
    padding-bottom: 0;
  }

  /* ============ MESSAGES (main column) ============ */
  .msg { margin: 18px 0; display: flex; flex-direction: column; }
  .msg-user { align-items: flex-end; }
  .msg-user .bubble {
    background: var(--user-bg);
    padding: 10px 14px;
    border-radius: 16px 16px 4px 16px;
    max-width: 80%;
    font-size: 14px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg-assistant { align-items: flex-start; position: relative; }
  .msg-branch-btn {
    position: absolute; top: 0; right: 0;
    opacity: 0; pointer-events: none;
    transition: opacity 0.15s;
    display: inline-flex; align-items: center; gap: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 6px;
    padding: 3px 9px;
    font-size: 11px; font-family: inherit;
    color: var(--muted); cursor: pointer;
    white-space: nowrap;
  }
  .msg-assistant:hover .msg-branch-btn { opacity: 1; pointer-events: auto; }
  .msg-branch-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .msg-assistant .body {
    font-size: 14.5px;
    line-height: 1.65;
    color: var(--text);
    max-width: 100%;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg-assistant .body .cursor,
  .plant-message .cursor {
    display: inline-block;
    width: 6px; height: 13px;
    background: var(--accent);
    vertical-align: -2px;
    margin-left: 2px;
    animation: blink 1s steps(2, start) infinite;
  }
  @keyframes blink { to { visibility: hidden; } }
  .msg-meta {
    font-size: 11px;
    color: var(--muted);
    margin: 2px 4px;
    letter-spacing: 0.02em;
  }

  /* ============ WEAVE MARKER (in main column after weaving) ============ */
  /* ============ WEAVE MARKER — floating seeds ============ */
  /* ============ WEAVE MARKER — dandelion seeds (floats in right margin) ============ */
  .weave-marker {
    position: relative;
    height: 0;
    margin: 0;
    overflow: visible;
  }
  .weave-marker-label {
    position: absolute;
    right: 6px;
    top: 4px;
    font-size: 10.5px; color: var(--muted);
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(244, 239, 230, 0.7);
    backdrop-filter: blur(4px);
    padding: 2px 8px;
    border-radius: 999px;
    z-index: 3;
    pointer-events: none;
  }
  .weave-route-badge {
    font-size: 10px; color: var(--weave-text);
    background: var(--accent-soft);
    border: 1px solid rgba(138,79,34,0.2);
    border-radius: 999px; padding: 1px 7px;
  }
  .weave-dandelion {
    position: absolute;
    right: -210px;   /* sit in the right gutter outside main content */
    top: -90px;
    display: block;
    overflow: visible;
    z-index: 2;
    pointer-events: none;
  }
  /* when the seed tray is open the gutter disappears, so float at the inside-right edge instead */
  body.has-plants .weave-dandelion {
    right: 4px;
  }
  .weave-dandelion .dan-seed { pointer-events: auto; }
  @keyframes seedFloat {
    0%   { transform: translate(0, 0); }
    50%  { transform: translate(2px, -3px); }
    100% { transform: translate(4px, -7px); }
  }
  .dan-seed {
    cursor: pointer;
    animation: seedFloat 3s ease-in-out infinite alternate;
  }
  .dan-seed:nth-child(2) { animation-duration: 2.9s; animation-delay: 0s;   }
  .dan-seed:nth-child(3) { animation-duration: 3.5s; animation-delay: 0.7s; }
  .dan-seed:nth-child(4) { animation-duration: 2.7s; animation-delay: 1.3s; }
  .dan-seed:nth-child(5) { animation-duration: 3.2s; animation-delay: 0.4s; }
  .dan-puff { transition: fill 0.15s; }
  .dan-seed:hover .dan-puff  { fill: var(--accent-soft); }
  .dan-seed:hover .dan-label { fill: var(--accent); }
  .dan-seed:hover .dan-stem  { stroke: var(--accent); opacity: 1; }
  .conflict-choice {
    margin: 18px 0;
    border: 1px solid var(--weave-border);
    background: var(--surface);
    border-radius: 10px;
    padding: 14px;
  }
  .conflict-choice-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .conflict-choice-body {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.55;
    margin-bottom: 12px;
  }
  .conflict-choice-options {
    display: grid;
    gap: 8px;
  }
  .conflict-choice-options button {
    width: 100%;
    text-align: left;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 7px;
    padding: 9px 10px;
    cursor: pointer;
    font-size: 13px;
  }
  .conflict-choice-options button:hover {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .conflict-choice-options button[disabled] {
    cursor: default;
    color: var(--muted);
    background: var(--surface-soft);
    border-color: var(--border);
  }

  /* ============ COMPOSER (main) ============ */
  .main-composer {
    position: sticky;
    bottom: 0;
    background: linear-gradient(to top, var(--bg) 65%, rgba(250,250,249,0));
    padding: 18px 24px 22px;
    z-index: 10;
    pointer-events: none;
    margin-top: auto;
  }
  .main-composer-inner {
    max-width: 760px;
    margin: 0 auto;
    pointer-events: auto;
    transition: max-width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  body.has-plants .main-composer-inner { max-width: none; padding: 0 8px; }
  .composer-box {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: 14px;
    padding: 10px 12px;
    display: flex; align-items: flex-end; gap: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .composer-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .composer-box textarea {
    flex: 1;
    border: 0;
    background: transparent;
    font: inherit; font-size: 14.5px; line-height: 1.55;
    resize: none; outline: none; color: var(--text);
    min-height: 24px; max-height: 160px;
    padding: 6px 4px;
  }
  .plant-btn,
  .send-btn {
    border: 0; cursor: pointer; flex-shrink: 0;
    border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .plant-btn {
    height: 32px;
    padding: 0 12px;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 13px;
    font-weight: 500;
  }
  .plant-btn:hover {
    background: var(--accent-soft);
  }
  .plant-btn svg { color: var(--accent); }
  .send-btn {
    width: 32px; height: 32px;
    background: var(--accent);
    color: white;
  }
  .send-btn:hover { background: var(--accent-hover); }
  .send-btn:disabled { background: var(--border-strong); cursor: not-allowed; }
  .composer-meta {
    display: none;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
  }
  .composer-meta .accent { color: var(--accent); font-weight: 500; }

  /* ============ PLANT COLUMN ============ */
  .plant-column-header {
    padding: 16px 18px 10px;
    border-bottom: 0;
    background: transparent;
    display: flex; align-items: center; gap: 10px;
  }
  .plant-column-title { font-size: 14px; font-weight: 600; letter-spacing: 0; }
  .plant-column-subtitle { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .tray-add-btn {
    margin-left: auto;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 999px;
    width: 28px;
    height: 28px;
    padding: 0;
    font-size: 12px; font-family: inherit;
    color: var(--accent);
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .tray-add-btn:hover { background: var(--accent-soft); border-color: var(--accent); }
  .tray-close-btn {
    border: 0;
    background: transparent;
    color: var(--muted);
    border-radius: 999px;
    width: 28px;
    height: 28px;
    padding: 0;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .tray-close-btn:hover {
    background: rgba(15, 15, 18, 0.06);
    color: var(--text);
  }
  .plant-column-body {
    flex: 1; overflow-y: auto;
    padding: 0 18px 16px;
  }
  .plant-column-footer {
    padding: 12px 18px 16px;
    border-top: 0;
    background: linear-gradient(to top, rgba(241,235,221,0.98) 70%, rgba(241,235,221,0));
  }
  .weave-btn {
    width: 100%;
    padding: 10px 14px;
    background: var(--accent);
    color: white;
    border: 0; border-radius: 999px;
    font-size: 13.5px; font-weight: 500;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  }
  .weave-btn:hover { background: var(--accent-hover); }
  .weave-btn:disabled { background: var(--border-strong); cursor: not-allowed; color: white; }
  .weave-hint {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
  }

  /* ============ SEED TRAY + FOCUS BLOOM ============ */
  .seed-tray {
    position: relative;
    display: grid;
    gap: 0;
    margin: 0 0 18px;
    padding: 4px 0 4px 0;
  }
  .seed-tray::before {
    content: "";
    position: absolute;
    left: 16px;
    top: 14px;
    bottom: 14px;
    width: 1px;
    background: linear-gradient(to bottom, rgba(111,139,85,0), rgba(111,139,85,0.34) 15%, rgba(111,139,85,0.34) 85%, rgba(111,139,85,0));
  }
  .seed {
    position: relative;
    background: transparent;
    border: 0;
    border-radius: 0;
    padding: 8px 0 8px 0;
    display: grid;
    grid-template-columns: 34px minmax(0, 1fr) auto;
    gap: 8px;
    align-items: center;
    min-height: 54px;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .seed:hover { transform: translateX(2px); }
  .seed.focused {
    transform: translateX(3px);
  }
  .seed-status-dot {
    width: 13px; height: 13px; border-radius: 50%;
    background: #8EAA6D;
    justify-self: center;
    z-index: 1;
    box-shadow: 0 0 0 6px var(--plant-bg);
    transition: width 0.15s, height 0.15s, background 0.15s, box-shadow 0.15s;
  }
  .seed.running .seed-status-dot {
    background: var(--accent);
    animation: pulse 1.4s ease-in-out infinite;
  }
  .seed.empty .seed-status-dot {
    background: transparent;
    border: 1px solid rgba(111,139,85,0.5);
  }
  .seed.focused .seed-status-dot {
    width: 18px;
    height: 18px;
    background: var(--accent);
    box-shadow: 0 0 0 6px var(--plant-bg), 0 0 0 9px rgba(201,123,78,0.14);
  }
  .seed.selected:not(.focused) .seed-status-dot { background: var(--accent); }
  @keyframes pulse {
    0%, 100% { opacity: 0.35; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.35); }
  }
  .seed-main { min-width: 0; }
  .seed-title {
    font-size: 13px;
    color: var(--text);
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .seed-preview {
    color: var(--muted);
    font-size: 11.5px;
    line-height: 1.35;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .seed-check {
    width: 24px;
    height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .seed-check input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }
  .seed-check-mark {
    width: 16px;
    height: 16px;
    border: 1px solid rgba(201, 123, 78, 0.48);
    border-radius: 50%;
    background: transparent;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: transparent;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .seed-check input:checked + .seed-check-mark {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .seed-check input:disabled + .seed-check-mark {
    opacity: 0.36;
    cursor: not-allowed;
  }
  .seed-weave-btn {
    display: none;
  }
  .seed-add-row,
  .plant-empty-action {
    width: 100%;
    border: 0;
    background: transparent;
    color: var(--accent);
    border-radius: 0;
    cursor: pointer;
    font: inherit;
    display: grid;
    grid-template-columns: 34px 1fr;
    align-items: center;
    gap: 8px;
    text-align: left;
    transition: transform 0.15s, color 0.15s;
  }
  .seed-add-row {
    position: relative;
    min-height: 44px;
    margin: 2px 0 0;
    font-size: 12.5px;
  }
  .plant-empty-action {
    min-height: 170px;
    margin-top: 24px;
    font-size: 13px;
    justify-content: start;
  }
  .seed-add-row:hover,
  .plant-empty-action:hover {
    transform: translateX(2px);
  }
  .seed-add-icon {
    position: relative;
    z-index: 1;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1px solid rgba(201,123,78,0.72);
    background: var(--plant-bg);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .plant-empty-action .seed-add-icon {
    width: 30px;
    height: 30px;
    justify-self: center;
  }
  .focus-bloom {
    background: transparent;
    border: 0;
    border-radius: 0;
    overflow: visible;
    min-height: 300px;
    display: grid;
    grid-template-rows: auto minmax(160px, 1fr) auto;
  }
  .focus-bloom-header {
    padding: 4px 0 12px 34px;
    border-bottom: 1px solid rgba(15, 15, 18, 0.09);
    background: transparent;
  }
  .focus-bloom-title {
    font-size: 13px;
    color: var(--text);
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .focus-bloom-subtitle {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .plant-messages {
    padding: 14px 0 12px 34px;
    min-height: 160px;
    max-height: 360px;
    overflow-y: auto;
  }
  .plant-message {
    margin-bottom: 10px;
    font-size: 13px;
    line-height: 1.55;
  }
  .plant-message:last-child { margin-bottom: 0; }
  .plant-message.user {
    text-align: right;
  }

<script type="module">
import { classifyWovenPlants, routeLabel } from "./scripts/merge-router.mjs";

/* ============================================================
   STATE
   ============================================================ */
const state = {
  parentContext: null,
  mainConv: [],       // user/assistant/weave-marker items
  plants: [],        // {id, title, turns, composerDraft, status, selected}
  activePlantId: null,
  nextId: 1,
  postWeaveArmed: false,
  currentModel: { id: "local:qwen-2-5-3b", label: "qwen2.5:3b", kind: "local" },
  // Shadow DAG — Phase 1. Mirror of mainConv/plants/weaves as a node/edge graph.
  // No reads yet; this is being populated so Phase 2 (walkContext) can verify
  // against the existing parentContext, and Phase 3 can cut over reads.
  // Shape matches docs/data_model.md: chat nodes (one parent, prompt+response)
  // and merge nodes (many parents, structural pooling).
  graph: {
    nodes: new Map(),  // id -> node
    edges: [],         // {from, to, kind}
    rootId: null,
    mainLeafId: null,  // current main-thread tip; new main turns attach here
  },
};
function makeId() { return "n" + (state.nextId++); }

/* ============================================================
   SHADOW GRAPH (Phase 1 — write-only)
   ============================================================ */
const graph = {
  reset() {
    state.graph.nodes.clear();
    state.graph.edges = [];
    state.graph.rootId = null;
    state.graph.mainLeafId = null;
  },
  // Add a chat node (prompt + response, one parent).
  // thread: "main" or "plant". plantId optional, set when thread === "plant".
  addChat({ id, thread, plantId = null, prompt, response = "", parent, modelLabel = null }) {
    const node = { id, kind: "chat", thread, plantId, prompt, response, parent, modelLabel };
    state.graph.nodes.set(id, node);
    if (parent) state.graph.edges.push({ from: parent, to: id, kind: "next" });
    if (!state.graph.rootId) state.graph.rootId = id;
    if (thread === "main") state.graph.mainLeafId = id;
    return node;
  },
  // Add a plant container node. Forks off main-thread leaf at creation time.
  addPlant({ id, title, parent }) {
    const node = { id, kind: "plant", title, parent };
    state.graph.nodes.set(id, node);
    if (parent) state.graph.edges.push({ from: parent, to: id, kind: "fork" });
    return node;
  },
  // Add a merge node. parents = last chat node of each woven plant.
  // Becomes the new main-thread leaf.
  addMerge({ id, parents, route }) {
    const node = { id, kind: "merge", parents: [...parents], route };
    state.graph.nodes.set(id, node);
    for (const p of parents) state.graph.edges.push({ from: p, to: id, kind: "merged-into" });
    state.graph.mainLeafId = id;
    return node;
  },
  // Update a streaming response after it finishes.
  setResponse(id, response) {
    const n = state.graph.nodes.get(id);
    if (n && n.kind === "chat") n.response = response;
  },
  // Update a plant title once the user's first turn names it.
  setPlantTitle(id, title) {
    const n = state.graph.nodes.get(id);
    if (n && n.kind === "plant") n.title = title;
  },
  // Return the id of the most recent chat/merge node attached to a plant.
  // Used to find merge-parents (the tip of each woven plant).
  plantTip(plantId) {
    let tip = plantId;
    for (const n of state.graph.nodes.values()) {
      if (n.kind === "chat" && n.plantId === plantId && n.parent === tip) {
        tip = n.id;
      }
    }
    // Simple walk: follow "next" edges from plant container forward.
    // The loop above is O(n²) worst case but n is tiny for a prototype.
    return tip;
  },
  toJSON() {
    return {
      rootId: state.graph.rootId,
      mainLeafId: state.graph.mainLeafId,
      nodes: [...state.graph.nodes.values()],
      edges: state.graph.edges,
    };
  },
};
// Dev helper: inspect the graph from DevTools.
if (typeof window !== "undefined") {
  window.__dumpGraph = () => {
    const json = graph.toJSON();
    console.log("[Dandelion graph]", json);
    return json;
  };
}

/* ============================================================
   SCRIPTED CONTENT
   ============================================================ */
const STARTERS = [
  {
    label: "📝 Reviewing a paper",
    kind: "primary",
    text: "I'm reviewing a paper for a workshop. The paper is about gated VLM inference for robot engagement decisions — it proposes a two-stage pipeline where lightweight perceptual detectors trigger video-VLM queries at socially salient moments. I'll ask you about specific parts.",
    contextLabel: "Reviewing: VLM robot engagement paper",
    response:
      "Got it — I'll keep that framing. Reviewing a two-stage VLM pipeline paper. " +
      "Drop in whichever sections, formulas, or claims you want to dig into. " +
      "If you want to multi-task — for example, ask me about a formula here while I unpack a different section in parallel — " +

    kind: "normal",

    contextLabel: "Debugging: EU latency spike",
    response:
      "Understood — EU-only latency regression with no recent deploys is one of the harder shapes to diagnose. " +
      "Common candidates: CDN/edge issues, third-party dependency degradation, traffic shifts, silent infra changes by your cloud provider. " +

  },

    contextLabel: "Researching: LLM branching UX history",
    response:
      "Got it — the space splits roughly into pre-2024 Loom-style multiverse interfaces for creative writing, " +
      "2024–2025 hosted tools (ChatGPT, Claude, TypingMind, LMCanvas), and 2025–2026 open-source desktop tools. " +
      "Use the Plant button to spawn parallel inquiries for specific tools or design patterns — they'll share this research context.",
  },
];

function generateReply(prompt) {
  const lower = prompt.toLowerCase();
  if (/formula|equation|math|derivation|theorem|proof|lemma/.test(lower)) {
    return {
      text:
        "Looking at the formula in context: the core move is using a discriminative posterior estimate directly rather than going through a generative observation model. " +
        "It's a reasonable shortcut for VLM outputs since you can't easily get a calibrated likelihood from them anyway, but it does break the POMDP belief-update guarantees the standard formulation gives you. " +
        "Worth raising in the review: do the authors justify this approximation, or is it convenient? " +
        "Not rejection-worthy but a thing they should add to the limitations.",
      duration: 4200,
    };
  }
  if (/baseline|comparison|sota|state of the art/.test(lower)) {
    return {
      text:
        "Their baselines are sequence models (GRU and similar) trained on the same data — a fair single-axis comparison since they hold data fixed. " +
        "The choice does sidestep a stronger baseline: a single-call VLM with no ensemble or saliency anchoring. That's the bar most readers will hold them to. " +
        "If they only beat the sequence models but not the single-call VLM, the contribution is much weaker. Check the table carefully for that row.",
      duration: 4600,
    };
  }
  if (/section\s*\d|that part|other part|the part about|second half|first half|section 5|section 4/.test(lower)) {
    return {
      text:
        "That section is where they describe the saliency-anchored self-critique pipeline. " +
        "K independent VLM samples produce behavior logs and intent estimates; a synthesis prompt extracts disputed claims; a verifier re-examines them — but instead of re-attaching raw video, the verifier sees pose-derived keyframes plus an external gaze label. " +
        "Worth scrutinizing whether the keyframe selection biases the verifier toward agreeing with the most-frequent sample. " +
        "If it does, the method is partly an ensembling trick dressed up as grounding.",
      duration: 5200,
    };
  }
  if (/method|approach|pipeline|architecture/.test(lower)) {
    return {
      text:
        "The two-stage framing is the core methodological contribution: stage one uses cheap perceptual detectors (gaze shifts, proxemic entries) to decide *when* to invoke a VLM, and stage two runs the VLM only at those triggered moments. " +
        "Sensible for cost and latency on edge hardware, and inherits a clean detection/interpretation separation that maps to standard HRI literature. " +
        "Weakness: stage-one false negatives mean the system can miss socially salient moments that don't trigger detectors, and the paper doesn't measure that directly.",
      duration: 5400,
    };
  }
  if (/experiment|result|table|figure/.test(lower)) {
    return {
      text:
        "The headline result is saliency-anchored self-critique outperforming vanilla self-consistency and self-critique on behavior-log accuracy. " +
        "The effect size is moderate (a few points), the comparison is on a small held-out set, and there are no confidence intervals reported. I'd be careful about claiming the improvement is robust. " +
        "Ask the authors for repeated-trial numbers. The qualitative examples in the appendix are more convincing than the headline table.",
      duration: 4400,
    };
  }
  if (/limitation|weakness|flaw|missing/.test(lower)) {
    return {
      text:
        "Main limitations I'd flag: (1) the held-out set is small enough that headline gains may not be statistically meaningful; " +
        "(2) the gaze classifier is trained on deployment data, making the pipeline less zero-shot than the abstract suggests; " +
        "(3) the saliency signals are tuned for trash-disposal gestures, so the generalization claim to broader social cues is unsupported by the experiments shown.",
      duration: 5000,
    };
  }
  if (/novelty|contribution|original|new/.test(lower)) {
    return {
      text:
        "The genuine novelty is the saliency-anchored verification step — using pose-derived keyframes plus an external gaze label as evidence for the second-pass VLM call. " +
        "Two-stage gating (perceptual detectors trigger VLM) is not new; what's new is grounding the verification step in physically meaningful saliency rather than re-attaching full video. " +
        "Whether the community considers it novel enough depends on framing: \"socially-grounded VLM verification\" is defensible; \"general engagement-decision pipeline\" makes the prior art look thicker.",
      duration: 5400,
    };
  }
  if (/cdn|edge|cloudflare|fastly|cache/.test(lower)) {
    return {
      text:
        "EU-only latency with no app changes is a classic CDN-edge issue. Three checks: " +
        "(1) edge-provider EU PoP health — sometimes degradations don't hit the public status page for hours; " +
        "(2) origin-shield routing — sometimes a regional shield flips and EU traffic takes a long path; " +
        "(3) compare cache hit rates per region for affected paths. A hit-rate drop in EU only is diagnostic.",
      duration: 4800,
    };
  }
  if (/database|db|query|postgres|mysql|index/.test(lower)) {
    return {
      text:
        "If only EU traffic is slow, the database is unlikely to be the primary cause unless you have regional replicas in worse shape. " +
        "Worth checking: do EU-served requests route to a different read replica than non-EU? If yes, check that replica's lag, IOPS, and recent autovacuum. " +
        "A silent replica promotion or vacuum storm could spike latency on one region without affecting others.",
      duration: 4400,
    };
  }
  if (/dependency|third.party|api|external/.test(lower)) {
    return {
      text:
        "Third-party services degrading in only one region is more common than people realize. " +
        "Check every external API your EU-region pods call: payments, auth, geolocation, ad networks. " +
        "Cross-reference each provider's status page for the last 48 hours, and look at p99 latency to each external endpoint from EU vs non-EU regions. " +
        "If even one external dep is 200ms slower from EU and you call it on the hot path, that's your spike.",
      duration: 4400,
    };
  }
  if (/chatgpt|openai/.test(lower)) {
    return {
      text:
        "ChatGPT shipped native branching in September 2025 as a \"Branch in new chat\" hover affordance, plus an implicit branch on message edit reachable via inline arrows. " +
        "Before that, branching existed only as a hidden side effect of editing. " +
        "ChatGPT's branching is not visualized as a tree — you navigate via arrows on the edited message, similar to Claude.ai.",
      duration: 4200,
    };
  }
  if (/claude|anthropic/.test(lower)) {
    return {
      text:
        "Claude.ai supports message branching only as a side effect of editing — there's no first-class fork action, no tree view, no canvas. " +
        "Branches are reachable via < > arrows on the edited message. " +
        "As of May 2026, Anthropic has not announced any branching-as-a-first-class-feature work publicly.",
      duration: 3800,
    };
  }
  if (/lmcanvas|canvas/.test(lower)) {
    return {
      text:
        "LMCanvas is the closest existing canvas-native branching tool. 300+ models via OpenRouter, branches as nodes on an infinite canvas, and a merge primitive — " +
        "but the merge is text concatenation, not context pooling. The model handling the post-merge turn sees the merged transcripts as raw appended text rather than as structurally-marked parallel branches, which limits how well it can integrate them.",
      duration: 4600,
    };
  }
  return {
    text:
      "Here's how I'd think about that: the strongest framing depends on which constraint is binding for you. " +
      "If you give me a couple more sentences on the specific angle you care about, I can give a more targeted take. " +
      "If you want to multi-task on this, the Plant button opens a parallel inquiry that shares this context — useful when you have two independent questions you don't want to interleave.",
    duration: 3600,
  };
}

function generatePostWeaveReply(prompt, wovenPlants) {
  // material_conflict never reaches here — it's handled by the conflict-choice UI.
  const topics = wovenPlants.map(t => t.title).join(" and ");
  return {
    text:

      "For these plants, that means using " + (topics || "the selected material") + " as updated context, then continuing without recapping each plant. " +
      "If the next task is implementation, make the data shape explicit first, then wire the visible interaction around it.",
    duration: 5400,
  };
}

async function callOllamaChat(prompt, system) {
  const response = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      prompt,
      context: state.parentContext,
      system,
    }),
  });
  if (!response.ok) throw new Error(await response.text());
  return response.json();
}

/* ============================================================
   RENDER — main column
   ============================================================ */
function renderMain() {
  mainInner.innerHTML = "";
  document.body.classList.toggle("is-empty", state.mainConv.length === 0);
  if (state.mainConv.length === 0) {
    renderEmpty();
    return;
  }
  state.mainConv.forEach((item) => {
    if (item.kind === "user") {
      const el = document.createElement("div");
      el.className = "msg msg-user";
      el.innerHTML = `<div class="bubble"></div>`;
      el.querySelector(".bubble").textContent = item.text;
      mainInner.appendChild(el);
    } else if (item.kind === "assistant") {
      const el = document.createElement("div");
      el.className = "msg msg-assistant";
      const bodyHtml = escapeHtml(item.text) + (item.status === "streaming" ? '<span class="cursor"></span>' : "");
      const branchBtn = item.status !== "streaming"
        ? `<button class="msg-branch-btn" data-branch-msg="${item.id}">` +
            `<svg width="11" height="11" viewBox="0 0 16 16" fill="none">` +
              `<path d="M8 13 Q8 8 4 3M8 13 Q8 8 12 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>` +
            `</svg> Branch` +
          `</button>`
        : "";
      el.innerHTML =
        `<div class="msg-meta">${escapeHtml(item.modelLabel || state.currentModel.label)}</div>` +
        `<div class="body">${bodyHtml}</div>` +
        branchBtn;
      el.querySelector(`[data-branch-msg="${item.id}"]`)?.addEventListener("click", () => openPlantFromMessage(item));
      mainInner.appendChild(el);
    } else if (item.kind === "weave-marker") {
      const el = document.createElement("div");
      el.className = "weave-marker";
      const n = item.plants.length;
      const routeBadge = item.route ? routeLabel(item.route.kind) : "";
      el.innerHTML =
        `<div class="weave-marker-label">` +
          `<span>woven${n > 1 ? ` · ${n} seeds` : ""}</span>` +
          (routeBadge ? `<span class="weave-route-badge">${escapeHtml(routeBadge)}</span>` : "") +
        `</div>` +
        renderDandelionSVG(item.plants);
      el.querySelectorAll(".dan-seed").forEach((seedEl, i) => {
        seedEl.addEventListener("click", () => reopenWovenSeed(item.plants[i]));
      });
      mainInner.appendChild(el);
    } else if (item.kind === "conflict-choice") {
      const el = document.createElement("div");
      el.className = "conflict-choice";
      el.innerHTML =
        `<div class="conflict-choice-title">These plants conflict in a way that changes what should happen next.</div>` +
        `<div class="conflict-choice-body">${escapeHtml(item.summary)}</div>` +
        `<div class="conflict-choice-options">` +
          item.choices.map((choice, i) =>
            `<button data-conflict-choice="${item.id}" data-choice-index="${i}" ${item.resolved ? "disabled" : ""}>${i + 1}. ${escapeHtml(choice)}</button>`
          ).join("") +
        `</div>`;
      el.querySelectorAll("button[data-conflict-choice]").forEach(btn => {
        btn.addEventListener("click", () => resolveConflictChoice(item.id, parseInt(btn.dataset.choiceIndex, 10)));
      });
      mainInner.appendChild(el);
    }
  });
  scrollToBottom(mainColumn);
}

function scrollToBottom(el) {
  requestAnimationFrame(() => {
    el.scrollTo({ top: el.scrollHeight, behavior: "smooth" });
  });
}
function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));
}

/* ============================================================
   RENDER — plant column
   ============================================================ */
function renderPlants() {
  const activeEl = document.activeElement;
  const activeDraftId = activeEl && activeEl.dataset ? activeEl.dataset.plantDraft : null;
  const activeSelection = activeDraftId ? {
    start: activeEl.selectionStart,
    end: activeEl.selectionEnd,
    value: activeEl.value,
  } : null;
  if (activeDraftId && activeSelection) {
    const activePlant = state.plants.find(s => s.id === activeDraftId);
    if (activePlant) activePlant.composerDraft = activeSelection.value;
  }

  // toggle has-plants on body
  if (state.plants.length > 0) {
    document.body.classList.add("has-plants");
    plantColumn.setAttribute("aria-hidden", "false");
  } else {
    document.body.classList.remove("has-plants");
    plantColumn.setAttribute("aria-hidden", "true");
  }

  plantColumnBody.innerHTML = "";

  if (state.plants.length === 0) {
    const emptySeed = document.createElement("button");
    emptySeed.className = "plant-empty-action";
    emptySeed.type = "button";
    emptySeed.innerHTML =
      `<span class="seed-add-icon">+</span>` +
      `<span>New seed</span>`;
    emptySeed.addEventListener("click", onOpenPlant);
    plantColumnBody.appendChild(emptySeed);
  } else {
    if (!state.activePlantId || !state.plants.some(s => s.id === state.activePlantId)) {
      state.activePlantId = state.plants[0].id;
    }
    const tray = document.createElement("div");
    tray.className = "seed-tray";
    state.plants.forEach((st, i) => {
      const seed = document.createElement("div");
      seed.className = "seed " + st.status;
      if (st.turns.length === 0) seed.classList.add("empty");
      if (st.selected) seed.classList.add("selected");
      if (st.id === state.activePlantId) seed.classList.add("focused");
      const title = st.title || ("Seed " + (i + 1));
      const preview = seedPreview(st);
      const disableMergeChk = st.status === "running" || st.turns.length === 0;
      const canWeave = st.status === "idle" && st.turns.length > 0;
      seed.innerHTML =
        `<span class="seed-status-dot"></span>` +
        `<div class="seed-main">` +
          `<div class="seed-title">${escapeHtml(title)}</div>` +
          `<div class="seed-preview">${escapeHtml(preview)}</div>` +
        `</div>` +
        `<button class="seed-weave-btn" data-seed-weave="${st.id}" ${canWeave ? "" : "hidden"}>Weave</button>` +
        `<label class="seed-check" title="Include in weave">` +
          `<input type="checkbox" data-plant-merge="${st.id}" ${st.selected ? "checked" : ""} ${disableMergeChk ? "disabled" : ""}>` +
          `<span class="seed-check-mark">✓</span>` +
        `</label>`;
      seed.addEventListener("click", () => {
        state.activePlantId = st.id;
        renderPlants();
      });
      seed.querySelector(`input[data-plant-merge="${st.id}"]`).addEventListener("click", e => e.stopPropagation());
      seed.querySelector(`input[data-plant-merge="${st.id}"]`).addEventListener("change", (e) => {
        st.selected = e.target.checked;
        renderPlants();
        updateWeaveButton();
      });
      seed.querySelector(`[data-seed-weave="${st.id}"]`)?.addEventListener("click", (e) => {
        e.stopPropagation();
        onWeaveOne(st.id);
      });
      tray.appendChild(seed);
    });
    const addRow = document.createElement("button");
    addRow.className = "seed-add-row";
    addRow.type = "button";
    addRow.innerHTML =
      `<span class="seed-add-icon">+</span>` +
      `<span>Plant another seed</span>`;
    addRow.addEventListener("click", onOpenPlant);
    tray.appendChild(addRow);
    plantColumnBody.appendChild(tray);

    const focused = state.plants.find(s => s.id === state.activePlantId);
    if (focused) {
      const bloom = document.createElement("div");
      bloom.className = "focus-bloom";
      const title = focused.title || "Untitled seed";
      const messagesHtml = renderPlantMessages(focused);
      const headerHtml = focused.turns.length > 0
        ? `<div class="focus-bloom-header">` +
            `<div class="focus-bloom-title">${escapeHtml(title)}</div>` +
            `<div class="focus-bloom-subtitle">${focused.status === "running" ? "growing" : "ready to weave"}</div>` +
          `</div>`
        : "";
      bloom.innerHTML =
        headerHtml +
        `<div class="plant-messages" data-plant-msgs="${focused.id}">${messagesHtml}</div>` +
        `<div class="plant-composer">` +
          `<textarea data-plant-draft="${focused.id}" placeholder="Ask in this seed…" rows="1">${escapeHtml(focused.composerDraft || "")}</textarea>` +
          `<button data-plant-send="${focused.id}" ${(!focused.composerDraft || !focused.composerDraft.trim() || focused.status === "running") ? "disabled" : ""}>` +
            `<svg width="12" height="12" viewBox="0 0 16 16" fill="none">` +
              `<path d="M2 8 L14 8 M9 3 L14 8 L9 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>` +
            `</svg>` +
          `</button>` +
        `</div>`;
      plantColumnBody.appendChild(bloom);
      wireFocusedSeedComposer(bloom, focused);
      const msgs = bloom.querySelector(`[data-plant-msgs="${focused.id}"]`);
      if (msgs) requestAnimationFrame(() => { msgs.scrollTop = msgs.scrollHeight; });
    }
  }

  if (activeDraftId && activeSelection) {
    requestAnimationFrame(() => {
      const restored = document.querySelector(`textarea[data-plant-draft="${activeDraftId}"]`);
      if (!restored) return;
      restored.focus();
      const pos = Math.min(activeSelection.start ?? restored.value.length, restored.value.length);
      const end = Math.min(activeSelection.end ?? pos, restored.value.length);
      restored.setSelectionRange(pos, end);
    });
  }

  const running = state.plants.filter(s => s.status === "running").length;
  const total = state.plants.length;
  if (total === 0) {
    plantColumnSubtitle.textContent = "plant a side thought";
  } else if (running > 0) {
    plantColumnSubtitle.textContent = `${running} growing`;
  } else {
    plantColumnSubtitle.textContent = `${total} planted`;
  }
  plantCountEl.textContent = total > 0 ? `${total} plant${total === 1 ? "" : "s"}` : "";
  updateWeaveButton();
}

function seedPreview(st) {
  if (st.status === "running") return "growing...";
  const last = [...st.turns].reverse().find(t => t.asst || t.user);
  if (!last) return "empty seed";
  return (last.asst || last.user || "").replace(/\s+/g, " ").slice(0, 96);
}

function renderPlantMessages(st) {
  if (st.turns.length === 0) {
    return `<div class="plant-empty">Ask a question that shares the session's context…</div>`;
  }
  return st.turns.map(turn => {
    let html = "";
    if (turn.user) {
      html += `<div class="plant-message user"><div class="bubble">${escapeHtml(turn.user)}</div></div>`;
    }
    if (turn.asst !== undefined) {
      const cursor = turn.status === "streaming" ? '<span class="cursor"></span>' : "";
      html += `<div class="plant-message assistant"><div class="body" data-plant-turn="${turn.id || ""}">${escapeHtml(turn.asst)}${cursor}</div></div>`;
    }
    return html;
  }).join("");
}

function wireFocusedSeedComposer(container, st) {
  const ta = container.querySelector(`textarea[data-plant-draft="${st.id}"]`);
  ta.addEventListener("input", (e) => {
    st.composerDraft = e.target.value;
    autoSizeTextarea(e.target, 100);
    const sb = container.querySelector(`button[data-plant-send="${st.id}"]`);
    sb.disabled = !st.composerDraft.trim() || st.status === "running";
  });
  ta.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendInPlant(st.id);
    }
  });
  autoSizeTextarea(ta, 100);

  const sb = container.querySelector(`button[data-plant-send="${st.id}"]`);
  sb.addEventListener("click", (e) => {
    e.stopPropagation();
    sendInPlant(st.id);
  });
}

function updateWeaveButton() {
  const eligible = state.plants.filter(s => s.selected && s.status === "idle" && s.turns.length > 0);
  const running = state.plants.filter(s => s.status === "running").length;
  if (state.plants.length === 0) {
    weaveBtn.disabled = true;
    weaveBtn.textContent = "Weave selected";
    weaveHint.textContent = "Plant a seed to start.";
  } else if (running > 0) {
    weaveBtn.disabled = true;
    weaveBtn.textContent = "Weave selected";
    weaveHint.textContent = "Let growing seeds finish first.";
  } else if (eligible.length === 0) {
    weaveBtn.disabled = true;
    weaveBtn.textContent = "Weave selected";
    weaveHint.textContent = "Pick a grown seed to weave.";
  } else {
    weaveBtn.disabled = false;
    weaveBtn.textContent = `Weave ${eligible.length} seed${eligible.length === 1 ? "" : "s"}`;
    weaveHint.textContent = "Selected seeds join the main thread.";
  }
}

function autoSizeTextarea(el, max) {
  el.style.height = "auto";
  el.style.height = Math.min(max, el.scrollHeight) + "px";
}

/* ============================================================
   ACTIONS
   ============================================================ */
function startWithStarter(starter) {
  state.parentContext = starter.contextLabel;
  contextChip.classList.add("visible");
  contextText.textContent = starter.contextLabel;
  state.mainConv.push({ kind: "user", text: starter.text });
  const id = makeId();
  const item = { kind: "assistant", id, text: "", status: "streaming" };
  state.mainConv.push(item);
  // graph: root chat node
  graph.addChat({ id, thread: "main", prompt: starter.text, parent: state.graph.mainLeafId });
  renderMain();
  streamInto(item, starter.response, 3000, () => composerInput.focus());
}

async function onSend() {
  const text = composerInput.value.trim();
  if (!text) return;
  composerInput.value = "";
  autoSizeTextarea(composerInput, 160);

  state.mainConv.push({ kind: "user", text });
  const id = makeId();
  const item = { kind: "assistant", id, text: "", status: "streaming" };
  state.mainConv.push(item);
  // graph: main-thread chat node attached to current leaf (which may be a merge node)
  graph.addChat({ id, thread: "main", prompt: text, parent: state.graph.mainLeafId });
  renderMain();

  if (state.postWeaveArmed) {
    state.postWeaveArmed = false;
    const lastFold = [...state.mainConv].reverse().find(x => x.kind === "weave-marker");
    if (!state.parentContext) {
      contextChip.classList.add("visible");
      state.parentContext = text.length > 60 ? text.slice(0, 60) + "…" : text;
      contextText.textContent = state.parentContext;
    }
    await streamPostWeaveFromOllama(item, text, lastFold);
    return;
  } else {
    if (!state.parentContext) {
      contextChip.classList.add("visible");
      state.parentContext = text.length > 60 ? text.slice(0, 60) + "…" : text;
      contextText.textContent = state.parentContext;
    }

    await streamMainFromOllama(item, text);
  }
}

async function streamMainFromOllama(item, prompt) {
  try {
    item.modelLabel = "Ollama qwen2.5:3b";
    item.text = "Thinking with local Ollama…";
    renderMain();
    const data = await callOllamaChat(
      prompt,
      "You are Dandelion, a concise assistant inside a local prototype. Answer directly and naturally.",
    );
    item.modelLabel = data.model ? `Ollama ${data.model}` : "Ollama";
    streamInto(item, data.answer || "", Math.max(2200, Math.min(6800, (data.answer || "").length * 22)));
  } catch (error) {
    item.modelLabel = "Scripted fallback";
    const reply = generateReply(prompt);
    streamInto(item, reply.text + "\n\n(Local Ollama was unavailable, so this used the scripted fallback.)", reply.duration);
  }
}

async function streamPostWeaveFromOllama(item, followUp, lastFold) {
  try {
    item.modelLabel = "Ollama qwen2.5:3b";
    item.text = "Thinking with local Ollama…";
    renderMain();
    const response = await fetch("/api/continue", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        parentContext: state.parentContext,
        mainConversation: state.mainConv.filter(x => x.id !== item.id),
        wovenPlants: lastFold ? lastFold.plants : [],
        route: lastFold ? { classification: lastFold.route.kind } : { classification: "additional_context" },
        followUp,
      }),
    });
    if (!response.ok) throw new Error(await response.text());
    const data = await response.json();
    item.modelLabel = data.model ? `Ollama ${data.model}` : "Ollama";
    streamInto(item, data.answer || "", Math.max(2200, Math.min(6800, (data.answer || "").length * 22)));
  } catch (error) {
    item.modelLabel = "Scripted fallback";
    const woven = lastFold ? Object.assign([...lastFold.plants], { route: lastFold.route }) : [];
    const reply = generatePostWeaveReply(followUp, woven);
    streamInto(item, reply.text + "\n\n(Local Ollama was unavailable, so this used the scripted fallback.)", reply.duration);
  }
}

function streamInto(item, fullText, durationMs, onDone) {
  const start = performance.now();
  const len = fullText.length;
  function tick(now) {
    const t = Math.min(1, (now - start) / durationMs);
    const chars = Math.floor(t * len);
    item.text = fullText.slice(0, chars);
    renderMain();
    if (t < 1) requestAnimationFrame(tick);
    else {
      item.status = "complete";
      // graph: persist finalized response
      graph.setResponse(item.id, fullText);
      renderMain();
      if (onDone) onDone();
    }
  }
  requestAnimationFrame(tick);
}

function onOpenPlant() {
  const draft = composerInput.value.trim();
  composerInput.value = "";
  autoSizeTextarea(composerInput, 160);

  const id = makeId();
  const st = {
    id,
    title: "",
    turns: [],
    composerDraft: draft,
    status: "idle",
    selected: false,
  };
  state.plants.push(st);
  state.activePlantId = id;
  // graph: plant container forks off current main-thread leaf
  graph.addPlant({ id, title: "", parent: state.graph.mainLeafId });
  renderPlants();

  setTimeout(() => {
    const ta = document.querySelector(`textarea[data-plant-draft="${id}"]`);
    if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
  }, 80);
}

async function sendInPlant(stId) {
  const st = state.plants.find(s => s.id === stId);
  if (!st || !st.composerDraft || !st.composerDraft.trim()) return;
  if (st.status === "running") return;

  const userText = st.composerDraft.trim();
  st.composerDraft = "";
  const draftEl = document.querySelector(`textarea[data-plant-draft="${stId}"]`);
  if (draftEl) draftEl.value = "";
  if (!st.title) {
    st.title = userText.length > 40 ? userText.slice(0, 40) + "…" : userText;
    graph.setPlantTitle(st.id, st.title);
  }
  const turn = { id: makeId(), user: userText, asst: "", status: "streaming" };
  // graph: chat node inplant. Parent is previous turn id, or the plant
  // container if this is the first turn.
  const turnParent = st.turns.length > 0 ? st.turns[st.turns.length - 1].id : st.id;
  st.turns.push(turn);
  graph.addChat({ id: turn.id, thread: "plant", plantId: st.id, prompt: userText, parent: turnParent });
  st.status = "running";
  st.selected = true;
  renderPlants();

  await streamPlantFromOllama(st, turn, userText);
}

async function streamPlantFromOllama(st, turn, prompt) {
  try {
    turn.asst = "Thinking with local Ollama…";
    renderPlants();
    const data = await callOllamaChat(
      prompt,
      "You are Dandelion running a plant investigation. Be specific, concise, and useful.",
    );
    streamIntoPlant(st, turn, data.answer || "", Math.max(2200, Math.min(6800, (data.answer || "").length * 22)));
  } catch (error) {
    const reply = generateReply(prompt);
    streamIntoPlant(st, turn, reply.text + "\n\n(Local Ollama was unavailable, so this used the scripted fallback.)", reply.duration);
  }
}

function streamIntoPlant(st, turn, fullText, durationMs) {
  const start = performance.now();
  const len = fullText.length;
  function tick(now) {
    const t = Math.min(1, (now - start) / durationMs);
    const chars = Math.floor(t * len);
    turn.asst = fullText.slice(0, chars);
    const body = document.querySelector(`[data-plant-turn="${turn.id}"]`);
    if (body) {
      body.innerHTML = escapeHtml(turn.asst) + (t < 1 ? '<span class="cursor"></span>' : "");
      const msgs = document.querySelector(`[data-plant-msgs="${st.id}"]`);
      if (msgs) msgs.scrollTop = msgs.scrollHeight;
    }
    if (t < 1) {
      requestAnimationFrame(tick);
    } else {
      turn.status = "complete";
      st.status = "idle";
      // graph: persist finalized plant response
      graph.setResponse(turn.id, fullText);
      renderPlants();
    }
  }
  requestAnimationFrame(tick);
}

function onWeave() {
  const woven = state.plants.filter(s => s.selected && s.status === "idle" && s.turns.length > 0);
  if (woven.length === 0) return;
  const wovenPayload = woven.map(s => ({
    title: s.title,
    turns: s.turns.map(t => ({ user: t.user, asst: t.asst })),
    _wovenKey: s.id,
  }));
  const route = classifyWovenPlants(wovenPayload);

  const mergeId = makeId();
  state.mainConv.push({
    kind: "weave-marker",
    id: mergeId,
    route,
    plants: wovenPayload,
  });
  // graph: merge node, parents = last turn of each woven plant. New main leaf.
  const mergeParents = woven.map(s => s.turns[s.turns.length - 1].id);
  graph.addMerge({ id: mergeId, parents: mergeParents, route });

  if (route.kind === "material_conflict") {
    state.mainConv.push({
      kind: "conflict-choice",
      id: makeId(),
      summary: route.summary,
      choices: route.choices,
      resolved: false,
    });
    state.postWeaveArmed = false;
  } else {
    state.postWeaveArmed = true;
  }

  const wovenIds = new Set(woven.map(s => s.id));
  state.plants = state.plants.filter(s => !wovenIds.has(s.id));

  renderPlants();
  renderMain();

  composerInput.placeholder = route.kind === "material_conflict" ? "Choose a path above to continue…" : "Continue from the woven context…";
  setTimeout(() => composerInput.focus(), 350);
}

function resolveConflictChoice(choiceId, choiceIndex) {
  const choiceItem = state.mainConv.find(item => item.kind === "conflict-choice" && item.id === choiceId);
  if (!choiceItem || choiceItem.resolved) return;
  const choice = choiceItem.choices[choiceIndex];
  choiceItem.resolved = true;
  choiceItem.selected = choiceIndex;

  state.mainConv.push({ kind: "user", text: choice });
  const item = { kind: "assistant", id: makeId(), text: "", status: "streaming" };
  state.mainConv.push(item);
  // graph: continuation chat node attached to the merge node (current leaf)
  graph.addChat({ id: item.id, thread: "main", prompt: choice, parent: state.graph.mainLeafId });
  composerInput.placeholder = "Continue from the chosen path…";
  renderMain();
  streamInto(item, "Got it. I'll carry that path forward as the main-thread context from here. The other stance remains visible in the weave fold, but I won't use it as the active direction unless you ask to revisit it.", 3600);
}

function closePlant(stId) {
  state.plants = state.plants.filter(s => s.id !== stId);
  if (state.activePlantId === stId) {
    state.activePlantId = state.plants[0] ? state.plants[0].id : null;
  }
  renderPlants();
}

function closeSeedPanel() {
  state.plants = [];
  state.activePlantId = null;
  renderPlants();
}

function newSession() {
  state.mainConv = [];
  state.plants = [];
  state.activePlantId = null;
  state.parentContext = null;
  state.postWeaveArmed = false;
  state.nextId = 1;
  graph.reset();
  composerInput.value = "";
  composerInput.placeholder = "Ask anything…";
  autoSizeTextarea(composerInput, 160);
  contextChip.classList.remove("visible");
  contextText.textContent = "";
  renderMain();
  renderPlants();
  setTimeout(() => composerInput.focus(), 100);
}

function openPlantFromMessage(item) {
  const id = makeId();
  const st = {
    id,
    title: "",
    contextHint: item.text.slice(0, 60) + (item.text.length > 60 ? "…" : ""),
    turns: [],
    composerDraft: "",
    status: "idle",
    selected: true,
  };
  state.plants.push(st);
  state.activePlantId = id;
  // graph: plant forked off main-thread leaf
  graph.addPlant({ id, title: "", parent: state.graph.mainLeafId });
  renderPlants();
  setTimeout(() => {
    const ta = document.querySelector(`textarea[data-plant-draft="${id}"]`);
    if (ta) ta.focus();
  }, 80);
}

function onWeaveOne(stId) {
  const st = state.plants.find(s => s.id === stId);
  if (!st || st.status === "running" || st.turns.length === 0) return;
  const wovenPayload = [{ title: st.title, turns: st.turns.map(t => ({ user: t.user, asst: t.asst })), _wovenKey: st.id }];
  const route = classifyWovenPlants(wovenPayload);
  const mergeId = makeId();
  state.mainConv.push({ kind: "weave-marker", id: mergeId, route, plants: wovenPayload });
  // graph: single-parent merge node
  graph.addMerge({ id: mergeId, parents: [st.turns[st.turns.length - 1].id], route });
  if (route.kind === "material_conflict") {
    state.mainConv.push({ kind: "conflict-choice", id: makeId(), summary: route.summary, choices: route.choices, resolved: false });
    state.postWeaveArmed = false;
  } else {
    state.postWeaveArmed = true;
  }
  state.plants = state.plants.filter(s => s.id !== stId);
  renderPlants();
  renderMain();
  composerInput.placeholder = route.kind === "material_conflict" ? "Choose a path above to continue…" : "Continue from the woven context…";
  setTimeout(() => composerInput.focus(), 350);
}

function renderDandelionSVG(plants) {
  // Anchor sits at the bottom-left of the SVG; all stems lean to the upper-right.
  const cx = 16, cy = 104, stemLen = 70;
  const n = plants.length;
  const angleMin = 20, angleMax = 78;   // degrees from vertical, all positive = leaning right
  const angles = n === 1 ? [(angleMin + angleMax) / 2] :
    Array.from({ length: n }, (_, i) => angleMin + (angleMax - angleMin) * i / (n - 1));
  const seeds = plants.map((t, i) => {
    const θ = angles[i] * Math.PI / 180;
    const tx = +(cx + stemLen * Math.sin(θ)).toFixed(1);
    const ty = +(cy - stemLen * Math.cos(θ)).toFixed(1);
    const lx = +(cx + (stemLen + 12) * Math.sin(θ)).toFixed(1);
    const ly = +(cy - (stemLen + 12) * Math.cos(θ)).toFixed(1);
    const title = (t.title || ("Seed " + (i + 1))).slice(0, 18);
    return `<g class="dan-seed" data-seed-i="${i}">` +
      `<line class="dan-stem" x1="${cx}" y1="${cy}" x2="${tx}" y2="${ty}" stroke="#C4B5A0" stroke-width="1" stroke-linecap="round" opacity="0.7"/>` +
      `<circle class="dan-puff" cx="${tx}" cy="${ty}" r="5" fill="white" stroke="var(--accent)" stroke-width="1.5"/>` +
      `<text class="dan-label" x="${lx}" y="${ly}" text-anchor="start" dominant-baseline="middle" ` +
        `font-size="10" fill="#5C5F66" font-family="Inter,sans-serif" font-weight="500">${escapeHtml(title)}</text>` +
    `</g>`;
  }).join("");
  return `<svg class="weave-dandelion" width="220" height="110" style="overflow:visible">` +
    `<circle cx="${cx}" cy="${cy}" r="3" fill="var(--accent)" opacity="0.55"/>` +
    seeds +
  `</svg>`;
}

function reopenWovenSeed(plantData) {
  const existing = state.plants.find(s => s._wovenKey === plantData._wovenKey);
  if (existing) {
    state.activePlantId = existing.id;
    renderPlants();
    return;
  }
  const id = makeId();
  const reopenedTurns = plantData.turns.map(t => ({ id: makeId(), user: t.user, asst: t.asst, status: "complete" }));
  const st = {
    id,
    title: plantData.title || "Woven seed",
    turns: reopenedTurns,
    composerDraft: "",
    status: "idle",
    selected: false,
    _wovenKey: plantData._wovenKey,
  };
  state.plants.push(st);
  state.activePlantId = id;
  // graph: re-opened plant forks off current leaf; each cloned turn becomes a chat node
  graph.addPlant({ id, title: st.title, parent: state.graph.mainLeafId });
  let prev = id;
  for (const t of reopenedTurns) {
    graph.addChat({ id: t.id, thread: "plant", plantId: id, prompt: t.user, response: t.asst, parent: prev });
    prev = t.id;
  }
  renderPlants();
}

/* ============================================================
   MODEL PICKER
   ============================================================ */
function selectModel(id, label, kind) {
  state.currentModel = { id, label, kind };
  modelName.textContent = label;
  modelDot.className = "dot" + (kind === "local" ? " local" : "");
  if (metaModel) metaModel.textContent = label;
  // mark selected option
  document.querySelectorAll(".model-option").forEach(opt => {
    opt.classList.toggle("selected", opt.dataset.model === id);
  });
}
function openModelMenu(open) {
  modelMenu.classList.toggle("open", open);
}

modelChip.addEventListener("click", (e) => {
  e.stopPropagation();
  openModelMenu(!modelMenu.classList.contains("open"));
});
document.querySelectorAll(".model-option").forEach(opt => {
  opt.addEventListener("click", (e) => {
    e.stopPropagation();
    selectModel(opt.dataset.model, opt.dataset.label, opt.dataset.kind);
    openModelMenu(false);
  });
});
document.addEventListener("click", (e) => {
  if (!e.target.closest(".model-picker")) openModelMenu(false);
});

/* ============================================================
   WIRING
   ============================================================ */
composerInput.addEventListener("input", () => autoSizeTextarea(composerInput, 160));
composerInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    onSend();
  }
});
composerSend.addEventListener("click", onSend);
plantBtn.addEventListener("click", onOpenPlant);
weaveBtn.addEventListener("click", onWeave);
$("#reset-btn").addEventListener("click", newSession);
$("#tray-add-btn").addEventListener("click", onOpenPlant);
$("#tray-close-btn").addEventListener("click", closeSeedPanel);

// init model selection visually
selectModel(state.currentModel.id, state.currentModel.label, state.currentModel.kind);
newSession();
</script>
