<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dandelion — prototype</title>
<link rel="icon" href="brand/logos/dandelion_app_icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="brand/logos/dandelion_app_icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="prototype/styles.css">
</head>
<body>

  <!-- ============ TOP BAR ============ -->
  <div class="top-bar">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 120 120" fill="none">
        <!-- Dandelion mark — DAG rotated 35°. See /brand/logos/dandelion.svg -->
        <g transform="rotate(35 60 60)">
          <g stroke="currentColor" stroke-width="7" stroke-linecap="round">
            <line x1="32" y1="30" x2="60" y2="90"/>
            <line x1="60" y1="30" x2="60" y2="90"/>
            <line x1="88" y1="30" x2="60" y2="90"/>
          </g>
          <g fill="currentColor">
            <circle cx="32" cy="30" r="10"/>
            <circle cx="60" cy="30" r="10"/>
            <circle cx="88" cy="30" r="10"/>
            <rect x="49" y="79" width="22" height="22" transform="rotate(45 60 90)"/>
          </g>
        </g>
      </svg>
      dandelion
    </div>
    <div class="context-chip" id="context-chip">
      <span class="label">Context</span><span id="context-text"></span>
    </div>
    <div class="actions">
      <span class="plant-count" id="plant-count"></span>
      <div class="model-picker" id="model-picker">
        <button class="chip" id="model-chip">
          <span class="dot" id="model-dot"></span>
          <span id="model-name">…</span>
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M2 4 L5 7 L8 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="model-picker-menu" id="model-menu"></div>
      </div>
      <button class="new-btn" id="reset-btn">New session</button>
    </div>
  </div>

  <!-- ============ WORKSPACE ============ -->
  <div id="workspace">

    <div id="main-column">
      <div id="main-inner"></div>

      <div class="main-composer">
        <div class="main-composer-inner">
          <div class="composer-box">
            <textarea id="composer-input" placeholder="Ask anything…" rows="1"></textarea>

            <button class="plant-btn" id="plant-btn" title="Plant a side seed that shares this context" aria-label="Plant a side seed">
              <svg width="18" height="18" viewBox="0 0 120 120" fill="none">
                <!-- Dandelion mark — matches brand icon. -->
                <g transform="rotate(35 60 60)">
                  <g stroke="currentColor" stroke-width="10" stroke-linecap="round">
                    <line x1="32" y1="30" x2="60" y2="90"/>
                    <line x1="60" y1="30" x2="60" y2="90"/>
                    <line x1="88" y1="30" x2="60" y2="90"/>
                  </g>
                  <g fill="currentColor">
                    <circle cx="32" cy="30" r="12"/>
                    <circle cx="60" cy="30" r="12"/>
                    <circle cx="88" cy="30" r="12"/>
                    <rect x="48" y="78" width="24" height="24" transform="rotate(45 60 90)"/>
                  </g>
                </g>
              </svg>
              <span>Plant</span>
            </button>

            <button class="send-btn" id="composer-send" title="Send (↵)">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <path d="M2 8 L14 8 M9 3 L14 8 L9 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="plant-column" aria-hidden="true">
      <div class="plant-column-header">
        <div>
          <div class="plant-column-title">Seeds</div>
          <div class="plant-column-subtitle" id="plant-column-subtitle">—</div>
        </div>
        <button class="tray-add-btn" id="tray-add-btn" title="New seed" aria-label="New seed">+</button>
        <button class="tray-close-btn" id="tray-close-btn" title="Close seeds" aria-label="Close seeds">×</button>
      </div>
      <div class="plant-column-body" id="plant-column-body"></div>
      <div class="plant-column-footer">
        <button class="graft-btn" id="graft-btn" disabled>Graft selected</button>
        <div class="graft-hint" id="graft-hint">Select completed seeds to graft.</div>
      </div>
    </div>

  </div>

<script type="module">
import { classifyGraftedPlants, routeLabel } from "./scripts/merge-router.mjs";
import { createGraph } from "./prototype/graph.mjs";
import { escapeHtml } from "./prototype/escape.mjs";
import { renderDandelionSVG } from "./prototype/dandelion-svg.mjs";
import { STARTERS, generateReply, generatePostGraftReply } from "./prototype/scripted-content.mjs";
import { createModelPicker } from "./prototype/model-picker.mjs";
import { createPlantTray } from "./prototype/plant-tray.mjs";
import { autoSizeTextarea } from "./prototype/dom-utils.mjs";
import * as api from "./prototype/api.mjs";
import { createMainThread } from "./prototype/main-thread.mjs";
import { createPlants } from "./prototype/plants.mjs";
import { createGraft } from "./prototype/graft.mjs";

/* ============================================================
   STATE
   ============================================================ */
const graph = createGraph();
const state = {
  parentContext: null,
  mainConv: [],       // user/assistant/graft-marker items
  plants: [],         // {id, title, turns, composerDraft, status, selected}
  activePlantId: null,
  nextId: 1,
  postGraftArmed: false,
  currentModel: { id: "", label: "loading…", kind: "local", provider: "", model: "" },
  availableModels: [],
  // Shadow DAG — Phase 1. See prototype/graph.mjs and docs/data_model.md.
  graph: graph.state,
};
function makeId() { return "n" + (state.nextId++); }
// Dev helper: inspect the graph from DevTools.
if (typeof window !== "undefined") {
  window.__dumpGraph = () => {
    const json = graph.toJSON();
    console.log("[Dandelion graph]", json);
    return json;
  };
}



// classifyGraftedPlants and routeLabel are imported from ./scripts/merge-router.mjs
// at the top of this module. They are the canonical merge-router heuristic,
// shared with the CLI harness and tests.

/* ============================================================
   DOM
   ============================================================ */
const $ = (s) => document.querySelector(s);
const mainColumn = $("#main-column");
const mainInner = $("#main-inner");
const plantColumn = $("#plant-column");
const plantColumnBody = $("#plant-column-body");
const plantColumnSubtitle = $("#plant-column-subtitle");
const graftBtn = $("#graft-btn");
const graftHint = $("#graft-hint");
const composerInput = $("#composer-input");
const composerSend = $("#composer-send");
const plantBtn = $("#plant-btn");
const plantCountEl = $("#plant-count");
const contextChip = $("#context-chip");
const contextText = $("#context-text");
const modelChip = $("#model-chip");
const modelMenu = $("#model-menu");
const modelName = $("#model-name");
const modelDot = $("#model-dot");
const metaModel = $("#meta-model");

/* ============================================================
   MAIN THREAD (see prototype/main-thread.mjs)
   ============================================================ */
const mainThread = createMainThread({
  dom: { column: mainColumn, inner: mainInner },
  state,
  graph,
  callbacks: {
    onBranch: (item) => openPlantFromMessage(item),
    onConflictChoice: (itemId, idx) => resolveConflictChoice(itemId, idx),
    onReopenGraftedSeed: (plant) => reopenGraftedSeed(plant),
  },
});
const renderMain = () => mainThread.render();
const streamInto = (item, fullText, durationMs, onDone) =>
  mainThread.streamInto(item, fullText, durationMs, onDone);
const streamMainFromOllama = (item, prompt) => mainThread.streamChat(item, prompt);
const streamPostGraftFromOllama = (item, followUp, lastFold) =>
  mainThread.streamContinue(item, followUp, lastFold);

/* ============================================================
   PLANT TRAY (see prototype/plant-tray.mjs)
   ============================================================ */
const plantTray = createPlantTray({
  dom: {
    column: plantColumn,
    body: plantColumnBody,
    subtitle: plantColumnSubtitle,
    countLabel: plantCountEl,
    graftBtn,
    graftHint,
  },
  state,
  callbacks: {
    onOpenPlant: () => onOpenPlant(),
    onGraftOne: (plantId) => onGraftOne(plantId),
    onSendInPlant: (plantId) => sendInPlant(plantId),
  },
});
const renderPlants = () => plantTray.render();
const updateGraftButton = () => plantTray.updateGraftButton();

/* ============================================================
   ACTIONS
   ============================================================ */
function startWithStarter(starter) {
  state.parentContext = starter.contextLabel;
  contextChip.classList.add("visible");
  contextText.textContent = starter.contextLabel;
  state.mainConv.push({ kind: "user", text: starter.text });
  const id = makeId();
  const item = { kind: "assistant", id, text: "", status: "streaming" };
  state.mainConv.push(item);
  // graph: root chat node
  graph.addChat({ id, thread: "main", prompt: starter.text, parent: state.graph.mainLeafId });
  renderMain();
  streamInto(item, starter.response, 3000, () => composerInput.focus());
}

async function onSend() {
  const text = composerInput.value.trim();
  if (!text) return;
  composerInput.value = "";
  autoSizeTextarea(composerInput, 160);

  state.mainConv.push({ kind: "user", text });
  const id = makeId();
  const item = { kind: "assistant", id, text: "", status: "streaming" };
  state.mainConv.push(item);
  // graph: main-thread chat node attached to current leaf (which may be a merge node)
  graph.addChat({ id, thread: "main", prompt: text, parent: state.graph.mainLeafId });
  renderMain();

  if (state.postGraftArmed) {
    state.postGraftArmed = false;
    const lastFold = [...state.mainConv].reverse().find(x => x.kind === "graft-marker");
    if (!state.parentContext) {
      contextChip.classList.add("visible");
      state.parentContext = text.length > 60 ? text.slice(0, 60) + "…" : text;
      contextText.textContent = state.parentContext;
    }
    await streamPostGraftFromOllama(item, text, lastFold);
    return;
  } else {
    if (!state.parentContext) {
      contextChip.classList.add("visible");
      state.parentContext = text.length > 60 ? text.slice(0, 60) + "…" : text;
      contextText.textContent = state.parentContext;
    }

    await streamMainFromOllama(item, text);
  }
}

/* ============================================================
   PLANTS (see prototype/plants.mjs)
   ============================================================ */
const plants = createPlants({
  state,
  graph,
  makeId,
  onChange: () => renderPlants(),
  patchTurn: (plantId, turnId, text, streaming) =>
    plantTray.patchTurn(plantId, turnId, text, streaming),
  focusComposer: (plantId) => plantTray.focusComposer(plantId),
  clearComposer: (plantId) => plantTray.clearComposer(plantId),
});

function onOpenPlant() {
  const draft = composerInput.value.trim();
  composerInput.value = "";
  autoSizeTextarea(composerInput, 160);
  plants.open(draft);
}

const sendInPlant = (stId) => plants.send(stId);
const closePlant = (stId) => plants.close(stId);
const closeSeedPanel = () => plants.closeAll();
const openPlantFromMessage = (item) => plants.openFromMessage(item);
const reopenGraftedSeed = (plantData) => plants.reopenGrafted(plantData);

/* ============================================================
   GRAFT (see prototype/graft.mjs)
   ============================================================ */
const graft = createGraft({
  state,
  graph,
  makeId,
  render: {
    main: () => renderMain(),
    plants: () => renderPlants(),
  },
  composer: {
    setPlaceholder: (text) => { composerInput.placeholder = text; },
    focusLater: (ms) => setTimeout(() => composerInput.focus(), ms),
  },
  streamInto: (item, text, durationMs) => streamInto(item, text, durationMs),
});
const onGraft = () => graft.graftSelected();
const resolveConflictChoice = (choiceId, idx) => graft.resolveConflictChoice(choiceId, idx);

function newSession() {
  state.mainConv = [];
  state.plants = [];
  state.activePlantId = null;
  state.parentContext = null;
  state.postGraftArmed = false;
  state.nextId = 1;
  graph.reset();
  composerInput.value = "";
  composerInput.placeholder = "Ask anything…";
  autoSizeTextarea(composerInput, 160);
  contextChip.classList.remove("visible");
  contextText.textContent = "";
  renderMain();
  renderPlants();
  setTimeout(() => composerInput.focus(), 100);
}

const onGraftOne = (stId) => graft.graftOne(stId);

/* ============================================================
   MODEL PICKER (see prototype/model-picker.mjs)
   ============================================================ */
const modelPicker = createModelPicker({
  chip: modelChip,
  menu: modelMenu,
  name: modelName,
  dot: modelDot,
  meta: metaModel,
  onChange(model) {
    state.currentModel = model;
  },
});

/* ============================================================
   WIRING
   ============================================================ */
composerInput.addEventListener("input", () => autoSizeTextarea(composerInput, 160));
composerInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    onSend();
  }
});
composerSend.addEventListener("click", onSend);
plantBtn.addEventListener("click", onOpenPlant);
graftBtn.addEventListener("click", onGraft);
$("#reset-btn").addEventListener("click", newSession);
$("#tray-add-btn").addEventListener("click", onOpenPlant);
$("#tray-close-btn").addEventListener("click", closeSeedPanel);

modelPicker.load();
newSession();
</script>
</body>
</html>
