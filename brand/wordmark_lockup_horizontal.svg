    <g stroke="currentColor" stroke-width="5" stroke-linecap="round">
      <line x1="32" y1="30" x2="60" y2="90"/>
      <line x1="60" y1="30" x2="60" y2="90"/>
      <line x1="88" y1="30" x2="60" y2="90"/>
